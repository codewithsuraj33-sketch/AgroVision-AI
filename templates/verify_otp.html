<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify OTP - AgroVisionAI</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="/static/verify-otp.js" defer></script>
    <style>
        :root {
            --primary: #4f8b27;
            --primary-light: #83b64a;
            --accent: #f9b12d;
            --bg-dark: #0f172a;
            --glass: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(255, 255, 255, 0.12);
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at top right, #1e293b, #0f172a);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            color: white;
        }

        .background-blobs {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }

        .blob {
            position: absolute;
            filter: blur(80px);
            border-radius: 50%;
            opacity: 0.4;
            animation: move 20s infinite alternate;
        }

        .blob-1 {
            width: 400px;
            height: 400px;
            background: var(--primary);
            top: -100px;
            right: -100px;
        }

        .blob-2 {
            width: 300px;
            height: 300px;
            background: #2563eb;
            bottom: -50px;
            left: -50px;
            animation-delay: -5s;
        }

        @keyframes move {
            from { transform: translate(0, 0) scale(1); }
            to { transform: translate(50px, 50px) scale(1.1); }
        }

        .verify-card {
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 32px;
            padding: 48px;
            width: 100%;
            max-width: 440px;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: fadeInScale 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes fadeInScale {
            from { opacity: 0; transform: scale(0.95) translateY(20px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        .icon-box {
            width: 72px;
            height: 72px;
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
            font-size: 32px;
            box-shadow: 0 10px 20px rgba(79, 139, 39, 0.3);
        }

        h1 {
            font-size: 28px;
            font-weight: 800;
            margin-bottom: 12px;
            letter-spacing: -0.5px;
        }

        p {
            color: rgba(255, 255, 255, 0.7);
            line-height: 1.6;
            margin-bottom: 32px;
        }

        .target-email {
            color: var(--primary-light);
            font-weight: 600;
        }

        .otp-inputs {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-bottom: 32px;
        }

        .otp-input {
            width: 52px;
            height: 64px;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid var(--glass-border);
            border-radius: 16px;
            text-align: center;
            font-size: 24px;
            font-weight: 700;
            color: white;
            transition: all 0.3s ease;
        }

        .otp-input:focus {
            outline: none;
            border-color: var(--primary-light);
            background: rgba(255, 255, 255, 0.1);
            transform: translateY(-2px);
            box-shadow: 0 0 20px rgba(131, 182, 74, 0.2);
        }

        .btn-verify {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            border: none;
            border-radius: 16px;
            color: white;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            box-shadow: 0 10px 20px rgba(79, 139, 39, 0.2);
        }

        .btn-verify:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 30px rgba(79, 139, 39, 0.3);
        }

        .resend-box {
            margin-top: 24px;
            font-size: 14px;
            color: rgba(255, 255, 255, 0.6);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .resend-box a,
        .resend-link {
            color: var(--primary-light);
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s;
        }

        .resend-link {
            background: transparent;
            border: 0;
            padding: 0;
            cursor: pointer;
            font: inherit;
        }

        .resend-box a:hover,
        .resend-link:hover {
            text-decoration: underline;
        }

        .error-toast {
            background: rgba(239, 68, 68, 0.15);
            border-left: 4px solid #ef4444;
            padding: 12px 16px;
            border-radius: 12px;
            margin-bottom: 24px;
            color: #fca5a5;
            font-size: 14px;
            text-align: left;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .notice-toast {
            background: rgba(59, 130, 246, 0.14);
            border-left: 4px solid #3b82f6;
            padding: 12px 16px;
            border-radius: 12px;
            margin-bottom: 24px;
            color: #bfdbfe;
            font-size: 14px;
            text-align: left;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .dev-otp {
            margin: -10px 0 24px;
            padding: 10px 12px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid var(--glass-border);
            color: rgba(255, 255, 255, 0.86);
            font-size: 14px;
        }

        .dev-otp code {
            font-weight: 800;
            letter-spacing: 0.16em;
            padding: 2px 8px;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.1);
        }

        /* Loading Animation */
        .spinner {
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.8s linear infinite;
            display: none;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .btn-verify.loading .spinner { display: block; }
        .btn-verify.loading .btn-text { display: none; }
        .btn-verify.loading .fa-arrow-right { display: none; }
    </style>
</head>
<body>
    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <div class="verify-card">
        <div class="icon-box">
            <i class="fa-solid fa-shield-halved"></i>
        </div>
        
        <h1>Security Check</h1>
        <p>Verification code sent to <br><span class="target-email">{{ target }}</span></p>

        {% if error %}
        <div class="error-toast">
            <i class="fa-solid fa-circle-exclamation"></i>
            {{ error }}
        </div>
        {% endif %}

        {% if notice %}
        <div class="notice-toast">
            <i class="fa-solid fa-circle-info"></i>
            {{ notice }}
        </div>
        {% endif %}

        {% if dev_otp %}
        <div class="dev-otp">
            Dev code: <code>{{ dev_otp }}</code>
        </div>
        {% endif %}

        <form action="/verify-otp" method="POST" id="otp-form">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <input type="hidden" name="otp" id="final-otp">
            <div class="otp-inputs">
                <input type="text" maxlength="1" class="otp-input" required>
                <input type="text" maxlength="1" class="otp-input" required>
                <input type="text" maxlength="1" class="otp-input" required>
                <input type="text" maxlength="1" class="otp-input" required>
                <input type="text" maxlength="1" class="otp-input" required>
                <input type="text" maxlength="1" class="otp-input" required>
            </div>

            <button type="submit" class="btn-verify" id="verify-btn">
                <span class="spinner"></span>
                <span class="btn-text">Verify Account</span>
                <i class="fa-solid fa-arrow-right"></i>
            </button>
        </form>

        <form class="resend-box" action="/resend-otp" method="POST">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <span>Didn't receive the code?</span>
            <button type="submit" class="resend-link">Resend OTP</button>
        </form>
    </div>

</body>
</html>
