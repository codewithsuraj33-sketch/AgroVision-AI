{% extends "admin/base.html" %}
{% block title %}Edit Product{% endblock %}
{% block content %}
  <section class="admin-page-head">
    <h1>Edit Product</h1>
    <p>#{{ product.id }} {{ product.name }}</p>
  </section>

  {% if error %}
    <div class="admin-alert admin-alert-error">{{ error }}</div>
  {% endif %}
  {% if success %}
    <div class="admin-alert admin-alert-success">{{ success }}</div>
  {% endif %}

  <section class="admin-panel">
    <form method="post" enctype="multipart/form-data" class="admin-form admin-form-grid">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <label class="admin-field">
        <span>Product Name</span>
        <input name="name" value="{{ product.name }}" required>
      </label>
      <label class="admin-field">
        <span>Price (INR)</span>
        <input name="price" type="number" min="1" value="{{ product.price }}" required>
      </label>
      <label class="admin-field">
        <span>Category</span>
        <select name="category">
          {% for c in categories %}
            <option value="{{ c }}" {% if c == product.category %}selected{% endif %}>{{ c }}</option>
          {% endfor %}
        </select>
      </label>
      <label class="admin-field">
        <span>Stock</span>
        <input name="stock" type="number" min="0" value="{{ product.stock or 0 }}">
      </label>
      <label class="admin-field admin-field-wide">
        <span>Image URL</span>
        <input name="image_url" value="{{ product.image_url or '' }}">
      </label>
      <label class="admin-field admin-field-wide">
        <span>Or Upload New Image</span>
        <input name="image_file" type="file" accept="image/*">
        {% if product.image_url %}
          <small class="admin-hint">Current: <a class="admin-link" href="{{ product.image_url }}" target="_blank" rel="noreferrer">{{ product.image_url }}</a></small>
        {% endif %}
      </label>
      <label class="admin-field admin-field-wide">
        <span>Description</span>
        <textarea name="description" rows="4">{{ product.description or '' }}</textarea>
      </label>
      <label class="admin-check">
        <input type="checkbox" name="is_active" {% if product.is_active %}checked{% endif %}>
        <span>Active</span>
      </label>
      <div class="admin-actions">
        <button class="admin-btn admin-btn-primary" type="submit">Save</button>
        <a class="admin-btn admin-btn-ghost" href="/admin/products">Back</a>
      </div>
    </form>
  </section>
{% endblock %}
