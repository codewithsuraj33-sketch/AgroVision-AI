<div class="sidebar-brand">
  {% if user and user.profile_photo %}
    <img
      class="dashboard-avatar-img"
      style="width:42px;height:42px;min-width:42px;min-height:42px;border-radius:50%;object-fit:cover;aspect-ratio:1 / 1;margin-right:12px;"
      src="/static/uploads/{{ user.profile_photo }}"
      alt="Avatar"
    >
  {% else %}
    <i class="fas fa-user dashboard-avatar"></i>
  {% endif %}
  <div class="sidebar-brand-copy">
    <strong>{{ user.name }}</strong>
    <span>Smart Farm AI</span>
  </div>
</div>

  <a class="sidebar-link{% if active_page == 'dashboard' %} is-active dashboard-active{% endif %}" href="/dashboard">
    <i class="fas fa-house sidebar-icon sidebar-icon-dashboard"></i>
    <span>Dashboard</span>
  </a>
  <a class="sidebar-link{% if active_page == 'crop_library' %} is-active library-active{% endif %}" href="/crop-library">

    <span>Crop Library</span>
  </a>
  <a class="sidebar-link{% if active_page == 'library' %} is-active library-active{% endif %}" href="/library">

  </a>
  <a class="sidebar-link{% if active_page == 'farms' %} is-active farms-active{% endif %}" href="/farms">

  </a>
